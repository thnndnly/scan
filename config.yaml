detection:
  method: opencv
  yolo_model_path: data/models/yolo_mtg.pt
  confidence_threshold: 0.5
  aspect_ratio_min: 0.60
  aspect_ratio_max: 0.85
  min_card_area_px: 5000
  iou_nms_threshold: 0.3
  max_card_area_frac: 0.50
  save_debug: true

recognition:
  primary_method: ocr
  fallback_method: hash
  ocr_confidence_threshold: 0.70
  hash_max_hamming_distance: 12
  llm_fallback_enabled: false
  ocr_languages:
    - en
    - de
  ocr_languages_cjk:
    - ja

scryfall:
  cache_ttl_hours: 24
  rate_limit_ms: 110
  cache_db_path: data/scryfall_cache.db
  prefer_local: true   # Lokalen Katalog vor API nutzen (kein Internet nötig)

output:
  default_format: both
  output_dir: ./output
  save_card_patches: false
  low_confidence_threshold: 0.60

dataset:
  enabled: true
  db_path: data/dataset.db
  save_patches: true

archive:
  enabled: true
  db_path: data/image_archive.db
  index_path: data/image_archive_index.json
  max_dimension: 1920
  jpeg_quality: 70
  thumbnail_size: 300
  thumbnail_quality: 50

catalog:
  enabled: true
  db_path: data/card_catalog.db
  bulk_type: default_cards

collection:
  db_path: data/collection.db

wishlist:
  db_path: data/wishlist.db

claude:
  model: claude-sonnet-4-6
  names_file: data/card_names.json
  fuzzy_cutoff: 80.0

clip:
  db_path: data/clip_embeddings.db
  model_name: openai/clip-vit-base-patch32
  similarity_threshold: 0.25
  top_k: 5
